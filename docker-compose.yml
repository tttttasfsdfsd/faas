version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID_STARTER: ${STRIPE_PRICE_ID_STARTER}
      STRIPE_PRICE_ID_PROFESSIONAL: ${STRIPE_PRICE_ID_PROFESSIONAL}
      MOYASAR_PUBLISHABLE_KEY: ${MOYASAR_PUBLISHABLE_KEY}
      MOYASAR_SECRET_KEY: ${MOYASAR_SECRET_KEY}
      REDIS_URL: redis://redis:6379
      APP_BASE_URL: ${APP_BASE_URL:-https://eexa.app}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://eexa.app}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
